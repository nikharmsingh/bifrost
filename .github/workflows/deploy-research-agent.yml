name: Deploy Research Agent

on:
  push:
    branches: [main]
    paths:
      - 'agents/research-agent/**'
      - 'packages/core/**'
      - 'packages/llm/**'
      - 'packages/tools/**'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync workspace
        run: uv sync --package research-agent

      - name: Run agent (smoke test)
        run: uv run --package research-agent python -c "from src.graph import graph; print('graph compiled ok')"
