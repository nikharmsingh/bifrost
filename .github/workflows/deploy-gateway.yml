name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - 'apis/gateway/**'
      - 'packages/core/**'
      - 'packages/llm/**'
      - 'uv.lock'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -f apis/gateway/Dockerfile -t gateway .

      # Uncomment and configure for your platform:
